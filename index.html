<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌈 Brand Universe — JAYKKo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow: hidden;
  height: 100vh;
}
#canvas { width: 100%; height: 100%; display: block; }

/* Overlay UI */
.overlay {
  position: fixed;
  top: 20px;
  left: 20px;
  z-index: 10;
  pointer-events: none;
}
.overlay h1 {
  font-size: 1.4rem;
  background: linear-gradient(135deg, #ff6b6b, #ffa500, #ffd700, #4ecdc4, #45b7d1, #a855f7, #ec4899);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.overlay p { color: #555; font-size: 0.75rem; margin-top: 4px; }

/* Info Panel */
.info-panel {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 10, 30, 0.85);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 20px 30px;
  min-width: 320px;
  max-width: 420px;
  z-index: 10;
  opacity: 0;
  transition: opacity 0.4s;
  pointer-events: none;
}
.info-panel.show { opacity: 1; }
.info-panel .ip-emoji { font-size: 2rem; }
.info-panel .ip-name { font-size: 1.2rem; font-weight: 700; margin: 4px 0; }
.info-panel .ip-sub { font-size: 0.75rem; color: #888; }
.info-panel .ip-desc { font-size: 0.8rem; color: #bbb; margin-top: 8px; line-height: 1.5; }
.info-panel .ip-status {
  display: inline-block;
  font-size: 0.65rem;
  padding: 3px 10px;
  border-radius: 10px;
  margin-top: 10px;
}
.ip-status.live { background: #1a3a2a; color: #4ecdc4; }
.ip-status.building { background: #3a2a1a; color: #ffa500; }
.ip-status.planned { background: #2a1a2a; color: #a855f7; }
.ip-status.active { background: #1a2a3a; color: #45b7d1; }

/* Layer Legend */
.legend {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 10;
  font-size: 0.7rem;
  pointer-events: none;
}
.legend div {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 6px;
  color: #666;
}
.legend .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* Controls hint */
.controls {
  position: fixed;
  bottom: 10px;
  right: 20px;
  font-size: 0.65rem;
  color: #333;
  z-index: 10;
}
</style>
</head>
<body>

<div class="overlay">
  <h1>🌈 JAYKKo Brand Universe</h1>
  <p>Drag to rotate · Scroll to zoom · Click a planet</p>
</div>

<div class="legend">
  <div><span class="dot" style="background:#ffd700"></span> Core AI</div>
  <div><span class="dot" style="background:#ff6b6b"></span> Traffic Engine</div>
  <div><span class="dot" style="background:#4ecdc4"></span> Service Layer</div>
  <div><span class="dot" style="background:#a855f7"></span> Backend Engine</div>
  <div><span class="dot" style="background:#45b7d1"></span> Trading</div>
</div>

<div class="info-panel" id="infoPanel">
  <div class="ip-emoji" id="ipEmoji"></div>
  <div class="ip-name" id="ipName"></div>
  <div class="ip-sub" id="ipSub"></div>
  <div class="ip-desc" id="ipDesc"></div>
  <div class="ip-status" id="ipStatus"></div>
</div>

<canvas id="canvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// Brand data
const brands = [
  // Core (orbit 0 = center)
  { name: '베리독', sub: 'VeryDog', emoji: '🐕', desc: 'AI 총괄 비서. 무지개빛 디지털 강아지. 모든 것의 허브.', status: 'active', layer: 'core', color: 0xffd700, orbit: 0, size: 1.8, speed: 0 },
  // Traffic Engine (orbit 1)
  { name: 'CMW', sub: 'Claw My Way', emoji: '🔥', desc: '정오 모티베이션. 실리콘밸리 레전드 명언 + 응원.', status: 'active', layer: 'traffic', color: 0xff6b6b, orbit: 4.5, size: 0.7, speed: 0.8, angle: 0 },
  { name: '블로그', sub: 'jaykko-blog', emoji: '✍️', desc: 'Hugo + GitHub Pages. SEO 장기 유입.', status: 'building', layer: 'traffic', color: 0xff8c00, orbit: 4.5, size: 0.55, speed: 0.65, angle: 2.1 },
  { name: '로파이', sub: 'Lo-Fi YouTube', emoji: '🎵', desc: 'Suno AI 로파이 → 유튜브 채널 + 숏폼 BGM.', status: 'planned', layer: 'traffic', color: 0xec4899, orbit: 4.5, size: 0.5, speed: 0.5, angle: 4.2 },
  // Service Layer (orbit 2)
  { name: 'AI Creative Lab', sub: '미니게임천국', emoji: '🧪', desc: '38개 인터랙티브 도구. 무료 트래픽 허브.', status: 'building', layer: 'service', color: 0x4ecdc4, orbit: 7.5, size: 0.8, speed: 0.45, angle: 0.5 },
  { name: 'GAME', sub: 'Gallery About ME', emoji: '🎮', desc: '$0.99 PRO 멤버십. 온오프 다이어리 허브.', status: 'live', layer: 'service', color: 0x4ecdc4, orbit: 7.5, size: 0.9, speed: 0.35, angle: 2.6 },
  { name: '넘버5스타', sub: 'Number 5 Star', emoji: '⭐', desc: '4.9~5.0 큐레이션 커뮤니티. GAME 통합 예정.', status: 'planned', layer: 'service', color: 0x4ecdc4, orbit: 7.5, size: 0.45, speed: 0.55, angle: 4.7 },
  // Backend Engine (orbit 3)
  { name: 'RedMoon', sub: 'Catch My Edge', emoji: '🔴', desc: '딜 파이프라인. 접수→초벌→모니터링→딜던.', status: 'building', layer: 'engine', color: 0xa855f7, orbit: 11, size: 0.7, speed: 0.3, angle: 0.3 },
  { name: '넘버닥터', sub: 'Number Doctor', emoji: '🏥', desc: '빅4 20년차급 재무 진단. DART 기반.', status: 'live', layer: 'engine', color: 0xa855f7, orbit: 11, size: 0.65, speed: 0.25, angle: 1.9 },
  { name: 'Eagle EYE', sub: 'Insight Finder', emoji: '🦅', desc: '트렌드/섹터 조기 포착 → 관련주 매핑.', status: 'building', layer: 'engine', color: 0xa855f7, orbit: 11, size: 0.6, speed: 0.35, angle: 3.5 },
  { name: '업계레이더', sub: 'Industry Radar', emoji: '📡', desc: '신탁사/운용사/증권사 동향 실시간 감시.', status: 'planned', layer: 'engine', color: 0xa855f7, orbit: 11, size: 0.45, speed: 0.2, angle: 5.1 },
  // Trading (orbit 4)
  { name: '경매 스나이퍼', sub: 'Auction Sniper', emoji: '⚡', desc: 'AI 경매/공매 분석. 가치평가 자동화.', status: 'planned', layer: 'trading', color: 0x45b7d1, orbit: 14, size: 0.5, speed: 0.18, angle: 1.0 },
  { name: '업비트 자동매매', sub: 'Crypto Bot', emoji: '📈', desc: 'pyupbit 크립토 트레이딩 봇.', status: 'planned', layer: 'trading', color: 0x45b7d1, orbit: 14, size: 0.5, speed: 0.15, angle: 4.1 },
];

// Scene setup
const canvas = document.getElementById('canvas');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 12, 20);
camera.lookAt(0, 0, 0);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

// Starfield
const starGeo = new THREE.BufferGeometry();
const starPositions = [];
for (let i = 0; i < 3000; i++) {
  starPositions.push((Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200, (Math.random() - 0.5) * 200);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15, transparent: true, opacity: 0.6 });
scene.add(new THREE.Points(starGeo, starMat));

// Ambient light
scene.add(new THREE.AmbientLight(0x333355, 0.5));

// Point light at center (sun)
const sunLight = new THREE.PointLight(0xffd700, 2, 50);
scene.add(sunLight);

// Orbit rings
const orbitRadii = [4.5, 7.5, 11, 14];
const orbitColors = [0xff6b6b, 0x4ecdc4, 0xa855f7, 0x45b7d1];
orbitRadii.forEach((r, i) => {
  const ringGeo = new THREE.RingGeometry(r - 0.02, r + 0.02, 128);
  const ringMat = new THREE.MeshBasicMaterial({ color: orbitColors[i], transparent: true, opacity: 0.15, side: THREE.DoubleSide });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  scene.add(ring);
});

// Create planet meshes
const planetMeshes = [];
const textSprites = [];

function createTextTexture(text, fontSize = 64) {
  const c = document.createElement('canvas');
  c.width = 256; c.height = 128;
  const ctx = c.getContext('2d');
  ctx.font = `${fontSize}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, 128, 64);
  return new THREE.CanvasTexture(c);
}

function createLabelTexture(text) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = '28px -apple-system, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = '#ffffff';
  ctx.fillText(text, 256, 32);
  return new THREE.CanvasTexture(c);
}

brands.forEach((b, i) => {
  // Planet sphere
  const geo = new THREE.SphereGeometry(b.size, 32, 32);
  const mat = new THREE.MeshStandardMaterial({
    color: b.color,
    emissive: b.color,
    emissiveIntensity: b.orbit === 0 ? 0.8 : 0.3,
    roughness: 0.4,
    metalness: 0.3,
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.userData = { brandIndex: i, brand: b };
  
  if (b.orbit === 0) {
    mesh.position.set(0, 0, 0);
  } else {
    mesh.position.set(
      Math.cos(b.angle) * b.orbit,
      (Math.random() - 0.5) * 0.5,
      Math.sin(b.angle) * b.orbit
    );
  }
  scene.add(mesh);
  planetMeshes.push(mesh);

  // Emoji sprite
  const emojiTex = createTextTexture(b.emoji, 80);
  const emojiMat = new THREE.SpriteMaterial({ map: emojiTex, transparent: true });
  const emojiSprite = new THREE.Sprite(emojiMat);
  emojiSprite.scale.set(b.size * 2, b.size, 1);
  emojiSprite.position.copy(mesh.position);
  emojiSprite.position.y += b.size + 0.6;
  scene.add(emojiSprite);

  // Label sprite
  const labelTex = createLabelTexture(b.name);
  const labelMat = new THREE.SpriteMaterial({ map: labelTex, transparent: true, opacity: 0.7 });
  const labelSprite = new THREE.Sprite(labelMat);
  labelSprite.scale.set(4, 0.5, 1);
  labelSprite.position.copy(mesh.position);
  labelSprite.position.y -= b.size + 0.5;
  scene.add(labelSprite);

  textSprites.push({ emoji: emojiSprite, label: labelSprite, brand: b });
});

// Glow for center planet
const glowGeo = new THREE.SphereGeometry(2.5, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({ color: 0xffd700, transparent: true, opacity: 0.08 });
scene.add(new THREE.Mesh(glowGeo, glowMat));

// Mouse controls (orbit)
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let rotation = { x: 0.3, y: 0 };
let targetRotation = { x: 0.3, y: 0 };
let zoom = 20;
let targetZoom = 20;

canvas.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
canvas.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetRotation.y += (e.clientX - prevMouse.x) * 0.005;
  targetRotation.x += (e.clientY - prevMouse.y) * 0.005;
  targetRotation.x = Math.max(-1.2, Math.min(1.2, targetRotation.x));
  prevMouse = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mouseup', () => isDragging = false);
canvas.addEventListener('mouseleave', () => isDragging = false);
canvas.addEventListener('wheel', e => {
  targetZoom += e.deltaY * 0.02;
  targetZoom = Math.max(8, Math.min(40, targetZoom));
});

// Touch controls
canvas.addEventListener('touchstart', e => {
  isDragging = true;
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
canvas.addEventListener('touchmove', e => {
  if (!isDragging) return;
  targetRotation.y += (e.touches[0].clientX - prevMouse.x) * 0.005;
  targetRotation.x += (e.touches[0].clientY - prevMouse.y) * 0.005;
  targetRotation.x = Math.max(-1.2, Math.min(1.2, targetRotation.x));
  prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });
canvas.addEventListener('touchend', () => isDragging = false);

// Click/tap to select
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const panel = document.getElementById('infoPanel');

function onSelect(e) {
  const x = e.clientX || (e.touches && e.touches[0].clientX);
  const y = e.clientY || (e.touches && e.touches[0].clientY);
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(planetMeshes);
  if (hits.length > 0) {
    const b = hits[0].object.userData.brand;
    document.getElementById('ipEmoji').textContent = b.emoji;
    document.getElementById('ipName').textContent = b.name;
    document.getElementById('ipSub').textContent = b.sub;
    document.getElementById('ipDesc').textContent = b.desc;
    const st = document.getElementById('ipStatus');
    st.textContent = b.status.toUpperCase();
    st.className = 'ip-status ' + b.status;
    panel.classList.add('show');
  } else {
    panel.classList.remove('show');
  }
}
canvas.addEventListener('click', onSelect);

// Animation
function animate() {
  requestAnimationFrame(animate);

  // Smooth camera
  rotation.x += (targetRotation.x - rotation.x) * 0.05;
  rotation.y += (targetRotation.y - rotation.y) * 0.05;
  zoom += (targetZoom - zoom) * 0.05;

  camera.position.x = Math.sin(rotation.y) * Math.cos(rotation.x) * zoom;
  camera.position.y = Math.sin(rotation.x) * zoom;
  camera.position.z = Math.cos(rotation.y) * Math.cos(rotation.x) * zoom;
  camera.lookAt(0, 0, 0);

  // Orbit planets
  const time = Date.now() * 0.001;
  planetMeshes.forEach((mesh, i) => {
    const b = mesh.userData.brand;
    if (b.orbit === 0) {
      mesh.rotation.y += 0.005;
      return;
    }
    const a = b.angle + time * b.speed * 0.3;
    mesh.position.x = Math.cos(a) * b.orbit;
    mesh.position.z = Math.sin(a) * b.orbit;
    mesh.rotation.y += 0.01;

    // Update sprite positions
    const sp = textSprites[i];
    sp.emoji.position.x = mesh.position.x;
    sp.emoji.position.z = mesh.position.z;
    sp.emoji.position.y = mesh.position.y + b.size + 0.6;
    sp.label.position.x = mesh.position.x;
    sp.label.position.z = mesh.position.z;
    sp.label.position.y = mesh.position.y - b.size - 0.5;
  });

  // Slow auto-rotate when not dragging
  if (!isDragging) {
    targetRotation.y += 0.001;
  }

  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
